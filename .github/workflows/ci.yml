name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Deploy preview to Vercel
        id: preview
        run: |
          DEPLOY_OUTPUT=$(npx vercel --token "${{ secrets.VERCEL_TOKEN }}" --yes 2>&1)
          echo "$DEPLOY_OUTPUT"
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.vercel\.app' | grep -v 'inspect' | tail -1)
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Check DECISIONS.md is present and up to date
        run: |
          # 1. File must exist
          if [ ! -f DECISIONS.md ]; then
            echo "❌ DECISIONS.md not found at project root."
            exit 1
          fi

          # 2. Must contain all three required sections
          for section in "## Architectural Decisions" "## Design Decisions" "## Coding Decisions"; do
            if ! grep -qF "$section" DECISIONS.md; then
              echo "❌ DECISIONS.md is missing section: $section"
              exit 1
            fi
          done

          # 3. Must have a Last updated date
          if ! grep -qE 'Last updated: [0-9]{4}-[0-9]{2}-[0-9]{2}' DECISIONS.md; then
            echo "❌ DECISIONS.md is missing a 'Last updated: YYYY-MM-DD' line."
            exit 1
          fi

          # 4. Warn if architectural files changed without touching DECISIONS.md
          ARCH_FILES="src/app/hooks/useFirebaseSync.ts src/app/firebase.ts src/app/data/seedData.ts src/app/App.tsx src/app/components/PDLCSection.tsx .github/workflows/ci.yml"
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          ARCH_CHANGED=""
          for f in $ARCH_FILES; do
            if echo "$CHANGED" | grep -qF "$f"; then
              ARCH_CHANGED="$ARCH_CHANGED $f"
            fi
          done
          if [ -n "$ARCH_CHANGED" ] && ! echo "$CHANGED" | grep -qF "DECISIONS.md"; then
            echo "⚠️  Architectural files changed without updating DECISIONS.md:"
            echo "$ARCH_CHANGED"
            echo "Update DECISIONS.md to reflect any new or changed decisions, then re-push."
            exit 1
          fi

          echo "✅ DECISIONS.md check passed."

      - name: Run Playwright tests against preview
        run: npx playwright test --config=playwright.config.ts
        env:
          BASE_URL: ${{ steps.preview.outputs.url }}

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/report/
          retention-days: 7

      # Only promote to production when tests pass on the main branch
      - name: Promote to production
        if: github.ref == 'refs/heads/main'
        run: npx vercel --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
